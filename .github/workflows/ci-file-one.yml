name: my-first-actions
run-name: action-file-one

on:
  push:

jobs:
  job-one:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the branch from repository
        uses: actions/checkout@v4

      - name: Show machine details
        run: |
            hostnamectl

      - name: Display context
        run: |
            echo "Repository : $GITHUB_REPOSITORY"
            echo "Workflow   : $GITHUB_WORKFLOW"
            echo "RunID      : $GITHUB_RUN_ID"
            echo "Commit SHA : $GITHUB_SHA"
            echo "Branch     : $GITHUB_REF_NAME"
            echo "Actor      : $GITHUB_ACTOR"
     
      - name: where am I ?.
        run: |
          pwd
          echo $GITHUB_WORKSPACE

      - name : Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-$${{ hashFiles('**/pom.xml') }}
          restore-keys: | 
            ${{ runner.os }}-maven-     
          
      - name: Run unit test
        run: |
          mvn clean test

      - name: List Target folder before jar creation 
        run: |
          ls -lh target

      - name: Build Jar
        run: |
          mvn clean package

      - name: List Target folder after jar creation 
        run: |
          ls -lh target
          
      - name: Display Jar File  
        run: |
          find target -name "*.jar"

      - name: Upload the jar file 
        uses: actions/upload-artifact@v4
        with:
          name: space-station-build-${{github.run_number}}
          path: target/*jar
    
          
