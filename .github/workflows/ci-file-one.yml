name: my-first-actions
run-name: action-file-one

on:
  push:
   branches: 
     - main
     - release/** ## trigger only on these branches
   # branches-ignore:
   #   - feature/** # build wont be automatically triggered for the feature branches
   paths-ignore:
     - docs/**
     - README.md # build won't be triggered if the changes is only made on those 
     
jobs:
  job-one:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the branch from repository
        uses: actions/checkout@v4

      - name: Show machine details
        run: |
            hostnamectl

      - name: we gonna display we details that runner has 
        run: |
            echo "Repository : $GITHUB_REPOSITORY"
            echo "Workflow   : $GITHUB_WORKFLOW"
            echo "RunID      : $GITHUB_RUN_ID"
            echo "Commit SHA : $GITHUB_SHA"
            echo "Branch     : $GITHUB_REF_NAME"
            echo "Actor      : $GITHUB_ACTOR"
     
      - name: where am I ?.
        run: |
          pwd
          echo $GITHUB_WORKSPACE

      # - name : We are Caching the Maven Dependencies 
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.m2/repository
      #     key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
      #     restore-keys: | 
      #       ${{ runner.os }}-maven-  

# --- NEW: Explicitly set up Java 17 and enable built-in Maven caching ---
      - name: Setup Java
        uses: ./.github/actions/base-setup-java

      - name: List Target folder before jar creation 
        run: |
          ls -lh target

      - name: Codeql Activities
        uses: github/codeql-action/init@v3
        with:
          languages: java
      
      - name: Scan for Leakage
        uses: gitleaks/gitleaks-action@v2

      - name: Scan FileSystem
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .   
          severity: HIGH,CRITICAL
          exit-code: "1"

# --- UPDATED: Run tests (Testcontainers will automatically use the runner's Docker daemon) ---          
      # - name: Run  the unit tests of this application
      #   run: |
      #     mvn clean test

# --- UPDATED: Build the Jar, but skip tests since we just ran them successfully ---
      - name: Build Jar file outta this application
        run: |
          mvn package -DskipTests

      - name: analysis on code coverage
        uses: github/codeql-action/analyze@v3

      - name: List Target folder after jar creation 
        run: |
          ls -lh target
          
      - name: Display Jar File we created 
        run: |
          find target -name "*.jar"

      # - name: Upload the jar file created outta this build
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: space-station-build-${{github.run_number}}
      #     path: target/*jar

      # login to Docker hub
      - name: We are Logging into DockerHub     
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_PLAYER_NAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Use Tag Generator
        id: versioner
        uses: ./.github/actions/generate-image-tag
          
      - name: now we gonna build the image using custom actions
        uses: ./.github/actions/base-setup-docker-build
        with:
          username: ${{ vars.DOCKER_PLAYER_NAME }}
          password: ${{ secrets.DOCKER_PASS }}
          image-name: spaceship-station
          image-tag: ${{ steps.versioner.outputs.image-tag }}
